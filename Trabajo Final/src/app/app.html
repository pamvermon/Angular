<div style="display: flex; min-height: 100vh; font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9;">
  
  <aside style="width: 260px; background-color: #1e293b; color: white; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">
    <div style="padding: 24px; font-size: 1.3rem; font-weight: bold; border-bottom: 1px solid #334155; color: #38bdf8;">
      ⚡ Panel de Gestión
    </div>
    
    <nav style="display: flex; flex-direction: column; gap: 8px; padding: 20px;">
      <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" 
         style="color: #94a3b8; text-decoration: none; padding: 12px 16px; border-radius: 8px; display: flex; align-items: center; gap: 10px; transition: all 0.3s;">
         🏠 Inicio
      </a>
      <a routerLink="/inicio" routerLinkActive="active" class="tu-clase-de-diseño">
         <i class="icono-casa"></i> Inicio
      </a>
      <a routerLink="/productos" routerLinkActive="active-link"
         style="color: #94a3b8; text-decoration: none; padding: 12px 16px; border-radius: 8px; display: flex; align-items: center; gap: 10px; transition: all 0.3s;">
         📦 Productos
      </a>
      <a routerLink="/usuarios" routerLinkActive="active-link"
         style="color: #94a3b8; text-decoration: none; padding: 12px 16px; border-radius: 8px; display: flex; align-items: center; gap: 10px; transition: all 0.3s;">
         👥 Usuarios
      </a>
      <div class="contenedor-blanco-de-la-derecha">
         <router-outlet></router-outlet> 
      </div>
    </nav>
  </aside>

  <main style="flex: 1; padding: 40px; overflow-y: auto;">
    <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
